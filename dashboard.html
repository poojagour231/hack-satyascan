<!DOCTYPE html>
<html>
<head>
<title>Satyascan Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Sidebar */
.sidebar {
    width: 250px;
    height: 100vh;
    background: #0f2a44;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h4 {
    margin-top: 10px;
}

.menu a {
    display: block;
    padding: 10px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-top: 10px;
}

.menu a:hover {
    background: #1c3d5a;
}

/* Main content */
.main {
    margin-left: 250px;
    padding: 30px;
    background: #f5f7fa;
    height: 100vh;
}
</style>

</head>

<body>

<!-- 🔵 SIDEBAR -->
<div class="sidebar">

    <h3>Satyascan 🔍</h3>
    <p>@user</p>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Scan History</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>

    <a href="/login/" class="btn btn-danger mt-5 w-100">Logout</a>

</div>

<!-- 🟢 MAIN CONTENT -->
<div class="main">

<h3>Fake Profile Detection</h3>
<p>Enter a profile to analyze</p>

<form method="POST">
{% csrf_token %}

<input type="text" name="profile" class="form-control mb-3" placeholder="Enter Profile Link">

<button class="btn btn-primary">Scan</button>

</form>

{% if result %}
<h4 class="mt-4">{{ result }}</h4>
{% endif %}

</div>

</body>
</html>
