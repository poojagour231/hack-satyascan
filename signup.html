<!DOCTYPE html>
<html>
<head>
<title>Satyascan Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    
.navbar {
    background:transparent;
}
.navbar-brand{
    font-size:20px;
    color:#2f80ed;
}
body {
     background:#01162b;
    
}

.card-box {
    background:#1e3a5f;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    width: 360px;
    border-radius: 12px;
}
body, .card-box{
    color:white;
}
.form-control{
    background:#f5f7fa;
    border:none;
}

.app-title {
    font-weight: bold;
    color: #2f80ed;
}

.btn-main {
    background-color: #2f80ed;
    color: white;
    border:none;
}
</style>
</head>
<body>
    <nav class="navbar px-4">
        <span class="navbar-brand fw-bold">Satyascan</span>
    </nav>
    

<div class="d-flex justify-content-center align-items-center vh-100 pt-5">
<div class="card p-4 card-box shadow">
<h4 class="text-center app-title">Satyascan </h4>
<p class="text-center text-muted">Create your account</p>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" class="form-control my-2" placeholder="Username" required>
<input type="email" name="email" class="form-control my-2" placeholder="Email" required>
<input type="password" name="password" class="form-control my-2" placeholder="Password" required>
<button class="btn btn-main w-100 mt-3">Sign Up</button>

</form>

<p class="text-center mt-3">
Already have an account?
<a href="/login/">Login</a>
</p>

</div>
</div>
</body>
</html>
